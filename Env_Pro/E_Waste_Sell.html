<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenScore - Sell E-Waste</title>
  <script>
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    if(localStorage.getItem('text-size') === 'large') document.documentElement.setAttribute('data-text', 'large');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style2.css" />
  <link rel="stylesheet" href="ewaste.css" />
  <style>
    .form-card {
        max-width: 650px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 40px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }
    
    [data-theme='light'] .form-card {
        background: rgba(255, 255, 255, 0.8);
        border-color: rgba(0,0,0,0.1);
        box-shadow: 0 15px 40px rgba(0,0,0,0.05);
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
    }

    .form-group input, .form-group textarea {
        width: 100%;
        background: rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.1);
        color: var(--text-color);
        padding: 14px 15px;
        border-radius: 12px;
        font-family: inherit;
        font-size: 15px;
        transition: 0.3s;
        resize: none;
    }
    
    .form-group input:focus, .form-group textarea:focus {
        border-color: var(--accent);
        outline: none;
    }

    [data-theme='light'] .form-group input, [data-theme='light'] .form-group textarea {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.1);
    }

    .upload-btn-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
    }
    .upload-btn-wrapper input[type=file] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
    }

  </style>
</head>
<body>
  <!-- PRELOADER -->
  <div id="loader">
    <div class="text-container">
      <h1 class="loader-text">REDUCE</h1>
      <h1 class="loader-text">REUSE</h1>
      <h1 class="loader-text">RECYCLE</h1>
    </div>
  </div>

  <div class="bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="cursor-glow"></div>

  <!-- NAV -->
  <div class="nav-container" id="navContainer">
    <nav>
      <div class="logo">GreenScore</div>
      <div class="hamburger"><span></span><span></span><span></span></div>
      <div class="menu">
        <a href="index.html" class="link home-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
          </span>
          <span class="link-title">Home</span>
        </a>
        <a href="Leaderboard.html" class="link leader-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
          </span>
          <span class="link-title">Leaderboard</span>
        </a>
        <a href="E_Waste.html" class="link active ewaste-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </span>
          <span class="link-title">E-Waste</span>
        </a>
        <a href="Team.html" class="link team-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 00-3-3.87" /><path d="M16 3.13a4 4 0 010 7.75" />
            </svg>
          </span>
          <span class="link-title">Team</span>
        </a>
        <a href="User_Profile.html" class="link profile-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </span>
          <span class="link-title">User Profile</span>
        </a>
      </div>
    </nav>
  </div>

  <section class="marketplace" style="padding-top: 140px; min-height: 100vh; text-align: center;">
    <div class="container" style="display: block;">
      
      <div style="text-align: left; width: 100%; max-width: 650px; margin: 0 auto;">
        <a href="E_Waste.html" style="color:var(--accent); text-decoration:none; font-weight:600; margin-bottom:10px; display:inline-block;">← Back to E-Waste Portals</a>
      </div>
      <h2 style="color:var(--accent); margin-bottom:5px; font-size:36px; text-align:center;">List New P2P Item</h2>
      <p style="color:var(--muted); margin-bottom:40px; text-align:center;">Upload your unused component details to index it directly to the native blockchain-mock registry.</p>
      
      <div class="form-card fade-in">
        <form id="sellForm">
            <div class="form-group">
                <label>Item Name *</label>
                <input type="text" id="itemName" required placeholder="e.g. Broken Casio fx-991EX">
            </div>
            
            <div class="form-split-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Serial Number (Optional)</label>
                    <input type="text" id="serialNumber" placeholder="e.g. SN-8821X">
                </div>
                <div class="form-group">
                    <label>Requested Price *</label>
                    <input type="text" id="itemPrice" required placeholder="e.g. ₹500 or 'Free'">
                </div>
            </div>

            <div class="form-group">
                <label>Listed By (Your Name) *</label>
                <input type="text" id="listedBy" required placeholder="e.g. Aarav Sharma">
            </div>

            <div class="form-group">
                <label>Detailed Description</label>
                <textarea id="description" rows="3" placeholder="Condition, scrap value, defects..."></textarea>
            </div>

            <div class="form-group upload-btn-wrapper">
                <label>Physical Item Photo (JPG/PNG) *</label>
                <button class="buy-btn" style="pointer-events: none;" type="button" id="uploadLabel">Browse Computer for Photo...</button>
                <input type="file" id="itemPhoto" accept="image/*" required onchange="document.getElementById('uploadLabel').innerText = this.files[0].name;" />
            </div>

            <button type="submit" class="btn sell-btn" style="width: 100%; margin-top: 20px; font-size:18px;">Publish Listing Live →</button>
            <div id="submitStatus" style="margin-top: 15px; font-weight:600;"></div>
        </form>
      </div>
      
    </div>
  </section>

  <!-- SUCCESS OVERLAY ANIMATION -->
  <div id="successOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(3,7,18,0.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);">
    <div style="font-size: 100px; margin-bottom: 20px; transform: scale(0.5);" id="successCheck">✅</div>
    <h2 style="color:var(--accent); font-size: 42px; margin-bottom: 10px; text-align:center;" id="successText">Item Listed Successfully!</h2>
    <p style="color:var(--muted); font-size: 18px; text-align:center;" id="successSub">Redirecting you to the live marketplace...</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="script.js"></script>
  <script src="ewaste_form.js"></script>
</body>
</html>
