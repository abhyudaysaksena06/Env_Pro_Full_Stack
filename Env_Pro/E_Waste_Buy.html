<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenScore - Buy E-Waste</title>
  <script>
    if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    if(localStorage.getItem('text-size') === 'large') document.documentElement.setAttribute('data-text', 'large');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style2.css" />
  <link rel="stylesheet" href="ewaste.css" />
</head>
<body>
  <!-- PRELOADER -->
  <div id="loader">
    <div class="text-container">
      <h1 class="loader-text">REDUCE</h1>
      <h1 class="loader-text">REUSE</h1>
      <h1 class="loader-text">RECYCLE</h1>
    </div>
  </div>

  <div class="bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="cursor-glow"></div>

  <!-- NAV -->
  <div class="nav-container" id="navContainer">
    <nav>
      <div class="logo">GreenScore</div>
      <div class="hamburger"><span></span><span></span><span></span></div>
      <div class="menu">
        <a href="index.html" class="link home-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
          </span>
          <span class="link-title">Home</span>
        </a>
        <a href="Leaderboard.html" class="link leader-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
          </span>
          <span class="link-title">Leaderboard</span>
        </a>
        <a href="E_Waste.html" class="link active ewaste-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </span>
          <span class="link-title">E-Waste</span>
        </a>
        <a href="Team.html" class="link team-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 00-3-3.87" /><path d="M16 3.13a4 4 0 010 7.75" />
            </svg>
          </span>
          <span class="link-title">Team</span>
        </a>
        <a href="User_Profile.html" class="link profile-link">
          <span class="link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </span>
          <span class="link-title">User Profile</span>
        </a>
      </div>
    </nav>
  </div>

  <section class="marketplace" style="padding-top: 140px; min-height: 100vh;">
    <div class="container" style="display: block;">
      
      <div class="market-header fade-in" style="justify-content: center; text-align: center; width: 100%;">
        <div style="width: 100%;">
          <div style="text-align: left; width: 100%;">
            <a href="E_Waste.html" style="color:var(--accent); text-decoration:none; font-weight:600; margin-bottom:10px; display:inline-block;">← Back to E-Waste Portals</a>
          </div>
          <h2 style="color:var(--accent); margin-bottom:5px; font-size:36px;">Live Marketplace (Buy)</h2>
          <p style="color:var(--muted); margin-bottom: 30px;">Secure items seamlessly from your verified university peers.</p>
          
          <div style="max-width: 600px; margin: 0 auto; position: relative;">
              <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search components, models, or serial numbers...">
          </div>
        </div>
      </div>

      <!-- ERROR / LOADING STATE -->
      <div id="marketStatus" style="text-align: center; color: var(--muted); padding: 40px; font-style: italic;">
        Fetching live listings from backend...
      </div>

      <div class="cards" id="marketplaceCards"></div>
      
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="script.js"></script>
  <script src="ewaste_api.js"></script>
</body>
</html>
