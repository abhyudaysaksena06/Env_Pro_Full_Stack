<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GreenScore - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <div class="bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  
  <div class="nav-container" id="navContainer">
    <nav>
      <div class="logo">GreenScore</div>
      <div class="menu">
        <a href="index.html" class="link home-link">
          <span class="link-title">Home</span>
        </a>
        <a href="Leaderboard.html" class="link leader-link">
          <span class="link-title">Leaderboard</span>
        </a>
        <a href="E_Waste.html" class="link ewaste-link">
          <span class="link-title">E-Waste</span>
        </a>
        <a href="User_Profile.html" class="link active profile-link">
          <span class="link-title">Profile</span>
        </a>
      </div>
    </nav>
  </div>

  <section class="profile-dashboard" style="display:flex; justify-content:center; align-items:center; min-height:80vh; padding-top:100px; padding-bottom:50px;">
    <div class="content-area fade-in visible" style="max-width:500px; width:100%; border-radius:24px; padding:30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
      <h2 style="color:var(--accent); text-align:center;">Create Account</h2>
      <p style="text-align:center; color:var(--muted); margin-bottom:20px;">Join the GreenScore Movement</p>
      
      <form id="registerForm" class="form-grid" style="grid-template-columns:1fr;">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="input-group">
          <label>College Email</label>
          <input type="email" id="email" required placeholder="example@thapar.edu">
        </div>
        <div class="input-group">
          <label>Thapar Roll Number</label>
          <input type="text" id="rollNumber" required placeholder="102203123">
        </div>
        <div class="input-group">
          <label>Mobile Number (For Buyers to Contact You)</label>
          <input type="text" id="phone" required placeholder="+91 9876543210">
        </div>
        <div class="input-group">
          <label>Hostel Name</label>
          <select id="hostelName" required style="width:100%; padding:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:12px; font-family:'Sora'; margin-bottom:5px;">
             <option value="" disabled selected>Select Hostel...</option>
             <option value="Hostel J">Hostel J</option>
             <option value="Hostel M">Hostel M</option>
             <option value="Hostel K">Hostel K</option>
             <option value="Hostel N">Hostel N</option>
             <option value="Hostel O">Hostel O</option>
             <option value="Day Scholar">Day Scholar</option>
          </select>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div id="registerError" style="color:#ef4444; font-size:13px; text-align:center; min-height:15px;"></div>
        <button type="submit" class="btn active" style="margin-top:10px;">Register & Start Earning</button>
      </form>
      
      <p style="text-align:center; margin-top:15px; font-size:14px; color:var(--muted);">
        Already have an account? <a href="login.html" style="color:var(--accent); text-decoration:none;">Log in instead</a>
      </p>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
</body>
</html>
